name: GPU 매물 감시

on:
  schedule:
    - cron: "*/15 * * * *" # 15분마다 (깃허브 부하에 따라 실제로는 15~25분 간격)
  workflow_dispatch: {} # 수동 실행 버튼 (Actions 탭에서 즉시 테스트용)

permissions:
  contents: write # seen.json 커밋용

concurrency:
  group: gpu-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 매물 확인 + 알림
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node watch.mjs

      - name: 상태(seen.json) 저장
        run: |
          git config user.name "gpu-watcher"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add seen.json
          git diff --staged --quiet || git commit -m "state: seen 업데이트 [skip ci]"
          git push
